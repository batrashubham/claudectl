version: 2

builds:
  - binary: claudectl
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: batrashubham
      name: homebrew-tap
    homepage: "https://github.com/batrashubham/claudectl"
    description: "Manage, backup, and resume Claude Code sessions"
    install: |
      bin.install "claudectl"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
